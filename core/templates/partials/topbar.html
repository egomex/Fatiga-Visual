<header class="topbar">
  <div class="topbar-left">
    <div class="eye-mini">
      <svg viewBox="0 0 34 34" fill="none">
        <ellipse cx="17" cy="17" rx="14" ry="9" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
        <circle cx="17" cy="17" r="4.5" fill="#38bdf8" opacity=".9"/>
        <circle cx="18.5" cy="15.5" r="1.4" fill="white" opacity=".6"/>
      </svg>
    </div>
    <span class="topbar-brand">EyeGuard</span>
    <span class="topbar-badge">Modo Básico</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-user">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      {{ usuario.nombre }}
    </span>
    <a href="{% url 'cerrar_sesion' %}" class="btn-exit">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Salir
    </a>
  </div>
</header>
